services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [nexus_internal]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 10
    networks: [nexus_internal]

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    ports:
      - "6333:6333"
    networks: [nexus_internal]

  opa:
    image: openpolicyagent/opa:latest-debug
    command: run --server --addr :8181 /policies --log-level info
    volumes:
      - ./opa/policies:/policies:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8181/health || exit 1"]
      interval: 5s
      retries: 10
    networks: [nexus_internal]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ./entrypoint.sh
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      qdrant:   {condition: service_started}
      opa:      {condition: service_healthy}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      retries: 5
    networks: [nexus_internal, nexus_public]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      qdrant:   {condition: service_started}
      opa:      {condition: service_healthy}
    networks: [nexus_internal, nexus_public]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api: {condition: service_healthy}
    networks: [nexus_public]

networks:
  nexus_internal:
    driver: bridge
    internal: true
  nexus_public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
