services:

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"

  worker:
    volumes:
      - ./backend:/app
    environment:
      LOG_LEVEL: DEBUG

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  opa:
    ports:
      - "8181:8181"
